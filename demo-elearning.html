<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Demo | E-Learning Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f7ff; }
        header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 1rem; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .back-btn { background: #fdbb4d; color: #333; padding: 8px 16px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
        .course-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .course-card:hover { transform: translateY(-5px); }
        .course-img { background: linear-gradient(135deg, #667eea, #764ba2); padding: 40px; text-align: center; font-size: 3rem; }
        .course-info { padding: 20px; }
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: #4caf50; height: 100%; width: 0%; border-radius: 10px; transition: width 0.5s; }
        .quiz-container { background: white; border-radius: 15px; padding: 30px; margin-top: 30px; display: none; }
        .question { font-size: 1.2rem; margin-bottom: 20px; }
        .option { background: #f0f0f0; padding: 12px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
        .option:hover { background: #fdbb4d; color: white; }
        .certificate { text-align: center; margin: 30px 0; padding: 30px; background: linear-gradient(135deg, #11998e, #38ef7d); border-radius: 15px; color: white; display: none; }
        .score { font-size: 2rem; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
<header>
    <div class="container">
        <h1>📚 E-Learning Platform Demo</h1>
        <a href="elearning.html" class="back-btn">← Back to Project</a>
    </div>
</header>

<div class="container">
    <div id="courseList" class="course-grid"></div>
    
    <div id="quizContainer" class="quiz-container">
        <h2 id="quizTitle"></h2>
        <div id="quizContent"></div>
        <div id="quizResult"></div>
    </div>
    
    <div id="certificate" class="certificate">
        <div style="font-size: 4rem;">🎓</div>
        <h2>Certificate of Completion</h2>
        <p>This certificate is awarded to</p>
        <h3 id="studentName">Student</h3>
        <p>for successfully completing the course with a score of <span id="finalScore">0</span>%</p>
        <button onclick="downloadCertificate()">📥 Download Certificate</button>
    </div>
</div>

<script>
    const studentName = prompt("Enter your name:", "Student") || "Student";
    document.getElementById('studentName').innerText = studentName;
    
    const courses = [
        { id: 1, name: "Web Development Bootcamp", icon: "💻", lessons: 12, progress: 0, quiz: [{ q: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyper Transfer Markup Language"], correct: 0 }, { q: "Which CSS property changes text color?", options: ["text-color", "color", "font-color"], correct: 1 }] },
        { id: 2, name: "Python Programming", icon: "🐍", lessons: 10, progress: 0, quiz: [{ q: "What is the output of print(2**3)?", options: ["6", "8", "9"], correct: 1 }, { q: "Which keyword is used to define a function?", options: ["func", "define", "def"], correct: 2 }] },
        { id: 3, name: "UI/UX Design", icon: "🎨", lessons: 8, progress: 0, quiz: [{ q: "What does UX stand for?", options: ["User Experience", "User Export", "Universal X-ray"], correct: 0 }, { q: "Which is a prototyping tool?", options: ["Photoshop", "Figma", "Excel"], correct: 1 }] }
    ];
    
    let currentCourse = null;
    let currentQuestion = 0;
    let score = 0;
    
    function renderCourses() {
        const grid = document.getElementById('courseList');
        grid.innerHTML = courses.map(course => `
            <div class="course-card" onclick="startCourse(${course.id})">
                <div class="course-img">${course.icon}</div>
                <div class="course-info">
                    <h3>${course.name}</h3>
                    <p>📹 ${course.lessons} lessons</p>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${course.progress}%"></div></div>
                    <p>Progress: ${course.progress}%</p>
                    <button style="background: #667eea; color: white; border: none; padding: 10px; border-radius: 5px; margin-top: 10px;">Start Learning →</button>
                </div>
            </div>
        `).join('');
    }
    
    function startCourse(courseId) {
        currentCourse = courses.find(c => c.id === courseId);
        currentQuestion = 0;
        score = 0;
        showQuiz();
    }
    
    function showQuiz() {
        document.getElementById('quizContainer').style.display = 'block';
        document.getElementById('certificate').style.display = 'none';
        document.getElementById('quizTitle').innerText = `${currentCourse.icon} ${currentCourse.name} - Quiz`;
        displayQuestion();
    }
    
    function displayQuestion() {
        if(currentQuestion >= currentCourse.quiz.length) {
            const percentage = (score / currentCourse.quiz.length) * 100;
            document.getElementById('quizContent').innerHTML = `
                <div style="text-align: center;">
                    <h3>Quiz Complete!</h3>
                    <div class="score">Your Score: ${score}/${currentCourse.quiz.length} (${percentage}%)</div>
                    ${percentage >= 70 ? '<p>🎉 Congratulations! You passed the course!</p><button onclick="showCertificate()">🎓 Get Certificate</button>' : '<p>📚 You need 70% to pass. Try again!</p><button onclick="retakeQuiz()">Retake Quiz</button>'}
                </div>
            `;
            document.getElementById('finalScore').innerText = percentage;
            return;
        }
        
        const q = currentCourse.quiz[currentQuestion];
        document.getElementById('quizContent').innerHTML = `
            <div class="question">Question ${currentQuestion + 1}/${currentCourse.quiz.length}</div>
            <div class="question"><strong>${q.q}</strong></div>
            ${q.options.map((opt, idx) => `<div class="option" onclick="answerQuestion(${idx})">${String.fromCharCode(65+idx)}. ${opt}</div>`).join('')}
        `;
    }
    
    function answerQuestion(selected) {
        const q = currentCourse.quiz[currentQuestion];
        if(selected === q.correct) {
            score++;
            alert("✅ Correct!");
        } else {
            alert(`❌ Incorrect! The correct answer is: ${q.options[q.correct]}`);
        }
        currentQuestion++;
        displayQuestion();
    }
    
    function retakeQuiz() {
        currentQuestion = 0;
        score = 0;
        displayQuestion();
    }
    
    function showCertificate() {
        document.getElementById('quizContainer').style.display = 'none';
        document.getElementById('certificate').style.display = 'block';
        
        // Update progress
        currentCourse.progress = 100;
        localStorage.setItem('courseProgress', JSON.stringify(courses));
        renderCourses();
    }
    
    function downloadCertificate() {
        const percentage = (score / currentCourse.quiz.length) * 100;
        const certHTML = `
            <div style="text-align: center; padding: 40px; border: 5px solid gold; font-family: Arial;">
                <h1>🎓 CERTIFICATE OF COMPLETION</h1>
                <p>This certificate is awarded to</p>
                <h2>${studentName}</h2>
                <p>for successfully completing</p>
                <h3>${currentCourse.name}</h3>
                <p>with a score of ${percentage}%</p>
                <p>Date: ${new Date().toLocaleDateString()}</p>
            </div>
        `;
        const blob = new Blob([certHTML], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `certificate-${studentName}.html`;
        a.click();
        alert('Certificate downloaded!');
    }
    
    renderCourses();
</script>
</body>
</html>
